global:
  scrape_interval: 15s

# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['192.167.117.37:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # - job_name: 'alertmanager'
  #   static_configs:
  #     - targets: ['192.167.117.37:9093']
      
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          job: node-exporter
          nodename: stock-monitoring-node