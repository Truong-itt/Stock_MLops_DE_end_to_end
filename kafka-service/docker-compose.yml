  #   command: >
  #     bash -c "echo 'Waiting for Kafka cluster...' &&
  #     cub kafka-ready -b kafka-1:29092 3 60 &&
  #     kafka-topics --create --if-not-exists --bootstrap-server kafka-1:29092 --topic stock_price_vn --partitions 20 --replication-factor 3 &&
  #     kafka-topics --create --if-not-exists --bootstrap-server kafka-1:29092 --topic stock_price_dif --partitions 20 --replication-factor 3 &&
  #     echo 'Topic stock_price ready (RF=3)'
  #     "
  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-setup
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    volumes:
      - ./log4j.properties:/tmp/log4j.properties:ro
    environment:
      KAFKA_LOG4J_OPTS: "-Dlog4j.configuration=file:/tmp/log4j.properties"
    networks:
      - stock-network
    command:
      - bash
      - -lc
      - |
        set -e
        echo 'Waiting for Kafka cluster...'
        cub kafka-ready -b kafka-1:29092 3 120

        echo 'Ensure topics exist...'
        kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic stock_price_vn  --partitions 50 --replication-factor 3 || true
        kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic stock_price_dif --partitions 50 --replication-factor 3 || true
        kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic news-sentiment --partitions 12 --replication-factor 3 || true

        echo 'Ensure partition count >= 50...'
        kafka-topics --bootstrap-server kafka-1:29092 --alter --topic stock_price_vn  --partitions 50 || true
        kafka-topics --bootstrap-server kafka-1:29092 --alter --topic stock_price_dif --partitions 50 || true

        echo 'Describe topics (head):'
        kafka-topics --bootstrap-server kafka-1:29092 --describe --topic stock_price_vn  | head -n 20
        kafka-topics --bootstrap-server kafka-1:29092 --describe --topic stock_price_dif | head -n 20

        echo '✅ Done (partitions>=50, RF=3)'

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    hostname: schema-registry
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - stock-network
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-1:29092,PLAINTEXT://kafka-2:29092,PLAINTEXT://kafka-3:29092

      # SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-1:29092, PLAINTEXT://kafka-2:29092, PLAINTEXT://kafka-3:29092

networks:
  stock-network:
    name: stock-network
    external : true
