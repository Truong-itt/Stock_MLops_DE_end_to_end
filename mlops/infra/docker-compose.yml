x-airflow-common: &airflow-common
  build:
    context: ./airflow
  user: "0:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "airflow-student-secret"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MODEL_NAME: churn_prediction_model
    PYTHONPATH: /opt/project
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    AWS_ACCESS_KEY_ID: minio
    AWS_SECRET_ACCESS_KEY: minio123
    AWS_DEFAULT_REGION: us-east-1
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ../../../:/opt/project
  depends_on:
    postgres:
      condition: service_healthy
  networks:
  - stock-network
  
services:
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: student_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - stock-network

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    container_name: student_minio_init
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123;
      mc mb -p local/mlflow || true;
      mc anonymous set download local/mlflow || true;
      "
    depends_on:
      minio:
        condition: service_healthy
    networks:
    - stock-network

  postgres:
    image: postgres:16
    container_name: student_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    networks:
    - stock-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: ./mlflow
    container_name: student_mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --serve-artifacts
      --artifacts-destination s3://mlflow
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
    - stock-network

  airflow-init:
    <<: *airflow-common
    container_name: student_airflow_init
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username airflow --password airflow --firstname Student --lastname Project --role Admin --email airflow@example.com"
    networks:
    - stock-network

  airflow-webserver:
    <<: *airflow-common
    container_name: student_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
    - stock-network

  airflow-scheduler:
    <<: *airflow-common
    container_name: student_airflow_scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
    - stock-network

  # fastapi:
  #   build:
  #     context: ../../../serving_pipeline/simple_api
  #   container_name: student_fastapi
  #   environment:
  #     MLFLOW_TRACKING_URI: http://mlflow:5000
  #     MODEL_NAME: churn_prediction_model
  #     MODEL_ALIAS: production
  #     INFERENCE_LOG_PATH: /app/logs/inference_log.jsonl
  #     DRIFT_SUMMARY_PATH: /app/reports/drift_summary.json
  #     MLFLOW_S3_ENDPOINT_URL: http://minio:9000
  #     AWS_ACCESS_KEY_ID: minio
  #     AWS_SECRET_ACCESS_KEY: minio123
  #     AWS_DEFAULT_REGION: us-east-1
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ../../../serving_pipeline/simple_api/logs:/app/logs
  #     - ../../../serving_pipeline/simple_api/reports:/app/reports
  #   depends_on:
  #     - mlflow
  #   networks:
  #   - stock-network
    
  gradio:
    build:
      context: ./serving_pipeline/gradio_ui
    container_name: student_gradio
    environment:
      PREDICT_API_URL: http://whale-ml-service:8090/predict-event
      HEALTH_API_URL: http://whale-ml-service:8090/health
    ports:
      - "7860:7860"
    networks:
    - stock-network

  whale-ml-service:
    container_name: whale-ml-service
    build:
      context: ./whale_ml
    restart: unless-stopped
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: truongittstock
      CLICKHOUSE_DB: stock_warehouse
      SYMBOL_REGISTRY_PATH: /app/config/symbol_registry.json
      MODEL_ARTIFACT_PATH: /app/artifacts/whale_move_model.joblib
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_DEFAULT_REGION: us-east-1
      WHALE_ML_MODEL_NAME: whale_move_forecaster
      WHALE_ML_MODEL_ALIAS: production
      PREFER_MLFLOW_REGISTRY: "1"
      MLFLOW_REGISTRY_REQUIRED: "1"
      AUTO_TRAIN_ON_STARTUP: "1"
      AUTO_RETRAIN_INTERVAL_MIN: "0"
      TRAIN_LOOKBACK_DAYS: "240"
      TRAIN_MAX_ROWS: "120000"
      MAX_FORECAST_HORIZON: "5"
    volumes:
      - ./whale_ml/artifacts:/app/artifacts
      - ../../config:/app/config:ro
    ports:
      - "8090:8090"
    networks:
    - stock-network

volumes:
  minio_data:
  postgres_data:
  mlflow_data:

networks:
  stock-network:
    name: stock-network
    external: true
