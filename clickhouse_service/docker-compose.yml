services:

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./init:/docker-entrypoint-initdb.d   # auto-run SQL on first start
    environment:
      CLICKHOUSE_DB: stock_warehouse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "truongittstock"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - stock-network
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  clickhouse-data:

networks:
  stock-network:
    external: true
