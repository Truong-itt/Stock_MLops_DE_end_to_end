services:
  producer:
    container_name: producer
    build: .
    restart: unless-stopped
    # depends_on:
    #   schema-registry:
    #     condition: service_healthy
    #   kafka:
    #     condition: service_started
    volumes:
      - ./log:/var/log/stockraw/
      - ../config:/app/config:rw
    networks:
      - stock-network

  agg-worker:
    container_name: agg-worker
    build: .
    command: ["python", "-u", "agg_worker.py"]
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./log:/var/log/stockraw/
      - ../config:/app/config:rw
    networks:
      - stock-network

  news-worker:
    container_name: news-worker
    build: .
    command: ["python", "-u", "news_worker.py"]
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./log:/var/log/stockraw/
      - ../config:/app/config:rw
    networks:
      - stock-network

  sentiment-worker:
    container_name: sentiment-worker
    build:
      context: .
      dockerfile: Dockerfile.sentiment
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    volumes:
      - ./log:/var/log/stockraw/
      - sentiment-model-cache:/app/.cache/huggingface
      - ../config:/app/config:rw
    networks:
      - stock-network
    deploy:
      resources:
        limits:
          memory: 4G

  data-gap-tool:
    container_name: data-gap-tool
    build: .
    command: ["python", "-u", "data_gap_tool.py", "audit", "--write-report"]
    restart: "no"
    environment:
      - PYTHONUNBUFFERED=1
      - SYMBOL_REGISTRY_PATH=/app/config/symbol_registry.json
    volumes:
      - ./log:/var/log/stockraw/
      - ../config:/app/config:rw
    networks:
      - stock-network

volumes:
  sentiment-model-cache:

networks:
  stock-network:
    name: stock-network
    external : true
