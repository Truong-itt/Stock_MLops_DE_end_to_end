services:
  producer:
    container_name: producer
    build: .
    restart: unless-stopped
    # depends_on:
    #   schema-registry:
    #     condition: service_healthy
    #   kafka:
    #     condition: service_started
    volumes:
      - ./log:/var/log/stockraw/
    networks:
      - stock-network

  agg-worker:
    container_name: agg-worker
    build: .
    command: ["python", "-u", "agg_worker.py"]
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./log:/var/log/stockraw/
    networks:
      - stock-network

  news-worker:
    container_name: news-worker
    build: .
    command: ["python", "-u", "news_worker.py"]
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./log:/var/log/stockraw/
    networks:
      - stock-network

  sentiment-worker:
    container_name: sentiment-worker
    build:
      context: .
      dockerfile: Dockerfile.sentiment
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    volumes:
      - ./log:/var/log/stockraw/
      - sentiment-model-cache:/app/.cache/huggingface
    networks:
      - stock-network
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  sentiment-model-cache:

networks:
  stock-network:
    name: stock-network
    external : true