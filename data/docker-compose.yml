services:
  producer:
    container_name: producer
    build: .
    # depends_on:
    #   schema-registry:
    #     condition: service_healthy
    #   kafka:
    #     condition: service_started
    volumes:
      - ./log:/var/log/stockraw/
    networks:
      - stock-network

  agg-worker:
    container_name: agg-worker
    build: .
    command: ["python", "agg_worker.py"]
    restart: unless-stopped
    volumes:
      - ./log:/var/log/stockraw/
    networks:
      - stock-network

  news-worker:
    container_name: news-worker
    build: .
    command: ["python", "news_worker.py"]
    restart: unless-stopped
    volumes:
      - ./log:/var/log/stockraw/
    networks:
      - stock-network

networks:
  stock-network:
    name: stock-network
    external : true